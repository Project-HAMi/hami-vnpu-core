name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - v[0-9]+.[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+.[0-9]+
      - v[0-9]+.[0-9]+
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        platform:
          - { runner: "ubuntu-22.04-arm", arch: "arm64"}
          - { runner: "ubuntu-22.04", arch: "amd64"}
    runs-on: ${{ matrix.platform.runner }}
    container:
      image: ascendai/cann:8.5.1
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build